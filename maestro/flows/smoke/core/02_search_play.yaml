appId: com.zili.android.musicfreeandroid.debug
name: smoke_core_search_play
tags:
  - smoke
  - core
  - search
  - player
---
- launchApp:
    stopApp: true
- tapOn:
    text: "允许|Allow|Allow notifications"
    optional: true
- extendedWaitUntil:
    visible:
      id: ".*home\\.navBar\\.search"
    timeout: 30000
- tapOn:
    id: ".*home\\.navBar\\.search"
    retryTapIfNoChange: true
- extendedWaitUntil:
    visible:
      id: ".*screen\\.search\\.root"
    timeout: 15000
- tapOn:
    id: ".*search\\.input"
    retryTapIfNoChange: true
- eraseText
- inputText: "jay"
- tapOn:
    text: "搜索"
    retryTapIfNoChange: true
- extendedWaitUntil:
    visible:
      id: ".*search\\.result\\.musicRow"
    timeout: 45000
- tapOn:
    id: ".*search\\.result\\.musicRow"
    index: 0
    retryTapIfNoChange: true
- extendedWaitUntil:
    visible:
      id: ".*player\\.fullscreen\\.root"
    timeout: 45000
- takeScreenshot: smoke_core_search_play_player
