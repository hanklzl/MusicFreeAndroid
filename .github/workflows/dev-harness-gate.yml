name: Dev Harness Gate
on:
  push:
    branches: [ main ]
  pull_request:
    branches:
      - main
      - 'feat/**'
      - 'fix/**'

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v3
      - name: Symlinks check
        run: bash scripts/dev-harness/symlinks-check.sh
      - name: Grep guards
        run: python3 scripts/dev-harness/grep-check.py
      - name: Compile-only test sources (all modules)
        # Guards INC-2026-0016: catch test fixture lag behind production VM
        # constructors. assembleDebug skips test source compile; we explicitly
        # compile every module's debug unit test sources so fixture drift fails
        # the gate at PR time. New modules MUST be added here.
        run: |
          ./gradlew \
            :app:compileDebugUnitTestKotlin :core:compileDebugUnitTestKotlin :data:compileDebugUnitTestKotlin \
            :downloader:compileDebugUnitTestKotlin :plugin:compileDebugUnitTestKotlin :player:compileDebugUnitTestKotlin \
            :feature:home:compileDebugUnitTestKotlin :feature:player-ui:compileDebugUnitTestKotlin \
            :feature:search:compileDebugUnitTestKotlin :feature:settings:compileDebugUnitTestKotlin \
            --no-daemon
      - name: Contract tests (JVM)
        # Only invoke modules that currently host harness/contracts/ tests; gradle
        # treats --tests with zero matches as failure, so listing modules without
        # contract tests would fail the gate. Extend this list when contract
        # tests land in other modules.
        run: |
          ./gradlew \
            :app:testDebugUnitTest :plugin:testDebugUnitTest :feature:player-ui:testDebugUnitTest \
            --tests '*harness.contracts.*' --no-daemon
