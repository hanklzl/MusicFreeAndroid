name: Dev Harness Gate
on:
  push:
    branches: [ main ]
  pull_request:
    branches:
      - main
      - 'feat/**'
      - 'fix/**'

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v3
      - name: Symlinks check
        run: bash scripts/dev-harness/symlinks-check.sh
      - name: Grep guards
        run: python3 scripts/dev-harness/grep-check.py
      - name: Contract tests (JVM)
        # Only invoke modules that currently host harness/contracts/ tests; gradle
        # treats --tests with zero matches as failure, so listing modules without
        # contract tests would fail the gate. Extend this list when contract
        # tests land in other modules.
        run: |
          ./gradlew \
            :app:testDebugUnitTest :plugin:testDebugUnitTest :feature:player-ui:testDebugUnitTest \
            --tests '*harness.contracts.*' --no-daemon
