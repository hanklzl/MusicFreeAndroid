name: Android Release APK

on:
  push:
    tags:
      - "v*"
  schedule:
    - cron: "0 18 * * *"   # 18:00 UTC == 北京时间次日 02:00
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-release-apk-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-release-apk:
    name: Build Release APK
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
    outputs:
      apk-name: ${{ steps.name-apk.outputs.apk_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for new commits (nightly only)
        id: nightly-guard
        if: github.event_name == 'schedule'
        run: |
          new_commits=$(git log --since="24 hours ago" --oneline origin/main | wc -l | tr -d ' ')
          echo "new_commits=$new_commits" >> "$GITHUB_OUTPUT"
          if [ "$new_commits" -eq 0 ]; then
            echo "::notice::No new commits in last 24h on main; skipping nightly build."
          fi

      - name: Set up JDK 21
        if: github.event_name != 'schedule' || steps.nightly-guard.outputs.new_commits != '0'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        if: github.event_name != 'schedule' || steps.nightly-guard.outputs.new_commits != '0'
        uses: gradle/actions/setup-gradle@v5

      - name: Set up Android SDK
        if: github.event_name != 'schedule' || steps.nightly-guard.outputs.new_commits != '0'
        uses: android-actions/setup-android@v4.0.1

      - name: Validate release secrets
        if: github.event_name != 'schedule' || steps.nightly-guard.outputs.new_commits != '0'
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
          ANDROID_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
          LOGAN_AES_KEY: ${{ secrets.LOGAN_AES_KEY }}
          LOGAN_AES_IV: ${{ secrets.LOGAN_AES_IV }}
        run: |
          missing=0
          for name in \
            ANDROID_RELEASE_KEYSTORE_BASE64 \
            ANDROID_RELEASE_STORE_PASSWORD \
            ANDROID_RELEASE_KEY_ALIAS \
            ANDROID_RELEASE_KEY_PASSWORD \
            LOGAN_AES_KEY \
            LOGAN_AES_IV
          do
            if [ -z "${!name}" ]; then
              echo "::error::$name is not configured in the GitHub release Environment"
              missing=1
            fi
          done
          exit "$missing"

      - name: Decode release keystore
        if: github.event_name != 'schedule' || steps.nightly-guard.outputs.new_commits != '0'
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
        run: |
          printf '%s' "$ANDROID_RELEASE_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"
          chmod 600 "$RUNNER_TEMP/release.jks"

      - name: Build Release APK
        if: github.event_name != 'schedule' || steps.nightly-guard.outputs.new_commits != '0'
        env:
          ANDROID_RELEASE_KEYSTORE_PATH: ${{ runner.temp }}/release.jks
          ANDROID_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
          LOGAN_AES_KEY: ${{ secrets.LOGAN_AES_KEY }}
          LOGAN_AES_IV: ${{ secrets.LOGAN_AES_IV }}
        run: ./gradlew :app:assembleRelease --no-daemon

      - name: Name APK
        id: name-apk
        if: github.event_name != 'schedule' || steps.nightly-guard.outputs.new_commits != '0'
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            apk_name="MusicFreeAndroid-${GITHUB_REF_NAME}.apk"
          elif [ "$GITHUB_EVENT_NAME" = "schedule" ]; then
            apk_name="MusicFreeAndroid-nightly-$(date -u +%Y%m%d)-$(git rev-parse --short HEAD).apk"
          else
            apk_name="MusicFreeAndroid-manual-${GITHUB_RUN_NUMBER}.apk"
          fi
          cp app/build/outputs/apk/release/app-release.apk "$RUNNER_TEMP/$apk_name"
          echo "apk_name=$apk_name" >> "$GITHUB_OUTPUT"

      - name: Upload Release APK artifact
        if: github.event_name != 'schedule' || steps.nightly-guard.outputs.new_commits != '0'
        uses: actions/upload-artifact@v7
        with:
          name: MusicFreeAndroid-release-apk
          path: ${{ runner.temp }}/${{ steps.name-apk.outputs.apk_name }}
          if-no-files-found: error
          retention-days: 14

  publish-github-release:
    name: Publish GitHub Release
    needs: build-release-apk
    if: github.event_name == 'push' && github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Release APK artifact
        uses: actions/download-artifact@v7
        with:
          name: MusicFreeAndroid-release-apk
          path: release-apk

      - name: Upload APK to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          apk_path="release-apk/${{ needs.build-release-apk.outputs.apk-name }}"
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "$apk_path" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "$apk_path" \
              --title "$GITHUB_REF_NAME" \
              --generate-notes
          fi
