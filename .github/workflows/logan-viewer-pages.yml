name: logan-viewer-pages

on:
  push:
    branches: [main]
    paths:
      - 'tools/logan-viewer/**'
      - '.github/workflows/logan-viewer-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: logan-viewer-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/logan-viewer
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tools/logan-viewer/package-lock.json
      - run: npm ci
      - run: npm test -- --run
      - run: npm run typecheck
      - name: Build
        run: npm run build
        env:
          VITE_PAGES_BASE: /${{ github.event.repository.name }}/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: tools/logan-viewer/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
