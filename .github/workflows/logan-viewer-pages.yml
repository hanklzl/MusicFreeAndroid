name: logan-viewer-pages

on:
  push:
    branches: [main]
    paths:
      - 'tools/logan-viewer/**'
      - '.github/workflows/logan-viewer-pages.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          path: source

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: source/tools/logan-viewer/package-lock.json

      - name: npm ci
        working-directory: source/tools/logan-viewer
        run: npm ci

      - name: Test
        working-directory: source/tools/logan-viewer
        run: npm test -- --run

      - name: Typecheck
        working-directory: source/tools/logan-viewer
        run: npm run typecheck

      - name: Build with Pages base path
        working-directory: source/tools/logan-viewer
        env:
          VITE_PAGES_BASE: /${{ github.event.repository.name }}/logan-viewer/
        run: npm run build

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Sync logan-viewer/ subdirectory
        run: |
          rm -rf gh-pages/logan-viewer
          mkdir -p gh-pages/logan-viewer
          cp -R source/tools/logan-viewer/dist/. gh-pages/logan-viewer/

      - name: Commit & push gh-pages
        working-directory: gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add logan-viewer
          if git diff --staged --quiet; then
            echo "No changes to logan-viewer/; skipping commit."
            exit 0
          fi
          git commit -m "chore(logan-viewer): publish from ${GITHUB_SHA::7}"
          for i in 1 2 3; do
            if git push origin gh-pages; then
              exit 0
            fi
            git pull --rebase origin gh-pages
          done
          echo "::error::Failed to push gh-pages after 3 attempts"
          exit 1
